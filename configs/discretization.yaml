discretization:
  output:
    dataset_root_dir: data/processed/discrete
    report_root_dir: reports/discretization
    datasets_dir_name: datasets
    metadata_dir_name: metadata
    tables_dir_name: tables
    markdown_dir_name: markdown
    save_csv: true
    save_excel: true

  columns:
    continuous_input_features:
      - "Rotational Speed"
      - "Plunging Speed"
      - "Composite Volume Fraction (%)"
    preserve_columns:
      - "No."
      - "Tool Shape"
    target_columns: all_configured

  binning:
    method: quantile
    supported_methods:
      - quantile
      - uniform
    n_bins: 3
    labels_start_at: 0
    include_lowest: true
    duplicates: drop
    preserve_low_cardinality_integer_values: true
    low_cardinality_unique_threshold: 3
    constant_bin_value: 0

  comparison:
    enabled: true
    target_columns:
      - "wear rate"
    cv_splits: 5
    repeated_seeds:
      - 7
      - 21
      - 42
      - 84
      - 168
    top_n_models: 3
    top_models_source: optimization_artifacts
    optimization_root_dir: reports/optimization
    fallback_top_models:
      - ridge
      - elasticnet
      - linear_regression
    use_best_parameters_when_available: true

  reports:
    write_csv: true
    write_markdown: true
    float_format: ".6g"

  mlflow:
    enabled: true
    experiment_name: friction-surrogate-xai-discretization
    artifact_path_prefix: discretization
    tags:
      stage: discretization
      comparison: original_vs_discrete
