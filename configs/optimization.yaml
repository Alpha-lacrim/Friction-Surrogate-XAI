optimization:
  output:
    root_dir: reports/optimization
    plots_dir_name: plots
    tables_dir_name: tables
    markdown_dir_name: markdown

  stage1_random_search:
    enabled: true
    n_trials_per_model: 20
    cv_splits: 5
    repeated_seeds:
      - 7
      - 21
      - 42
      - 84
      - 168

  stage2_selection:
    top_n_models: 3
    ranking_metric: r2

  stage3_optuna:
    enabled: true
    n_trials_per_model: 50
    sampler: tpe
    direction: maximize
    timeout_seconds: null

  scoring:
    primary_metric: r2
    metrics:
      - r2
      - rmse
      - nrmse
      - mae
    nrmse_denominator: range
    higher_is_better:
      - r2

  reports:
    write_csv: true
    write_markdown: true
    float_format: ".6g"

  plots:
    enabled: true
    style: whitegrid
    context: paper
    palette: deep
    dpi: 300
    figure_format: png

  mlflow:
    enabled: true
    experiment_name: friction-surrogate-xai-optimization
    artifact_path_prefix: optimization
    tags:
      stage: hyperparameter_optimization
      search_policy: random_search_then_optuna_top3
      grid_search_allowed: "false"

  search_spaces:
    linear_regression: {}

    ridge:
      alpha:
        type: log_float
        low: 0.001
        high: 100.0

    elasticnet:
      alpha:
        type: log_float
        low: 0.001
        high: 10.0
      l1_ratio:
        type: float
        low: 0.05
        high: 0.95

    svr_rbf:
      C:
        type: log_float
        low: 0.1
        high: 100.0
      epsilon:
        type: log_float
        low: 0.001
        high: 1.0
      gamma:
        type: categorical
        values:
          - scale
          - auto

    gaussian_process_regression:
      alpha:
        type: log_float
        low: 0.000001
        high: 0.1
      n_restarts_optimizer:
        type: int
        low: 0
        high: 2

    random_forest:
      n_estimators:
        type: int
        low: 100
        high: 500
      max_depth:
        type: categorical
        values:
          - 2
          - 3
          - 4
          - 5
          - null
      min_samples_leaf:
        type: int
        low: 2
        high: 8
      min_samples_split:
        type: int
        low: 4
        high: 12
      max_features:
        type: categorical
        values:
          - sqrt
          - log2
          - 1.0
      bootstrap:
        type: categorical
        values:
          - true

    extra_trees:
      n_estimators:
        type: int
        low: 100
        high: 500
      max_depth:
        type: categorical
        values:
          - 2
          - 3
          - 4
          - 5
          - null
      min_samples_leaf:
        type: int
        low: 2
        high: 8
      min_samples_split:
        type: int
        low: 4
        high: 12
      max_features:
        type: categorical
        values:
          - sqrt
          - log2
          - 1.0
      bootstrap:
        type: categorical
        values:
          - true

    gradient_boosting:
      n_estimators:
        type: int
        low: 100
        high: 500
      learning_rate:
        type: log_float
        low: 0.005
        high: 0.1
      max_depth:
        type: int
        low: 1
        high: 3
      min_samples_leaf:
        type: int
        low: 2
        high: 8
      subsample:
        type: float
        low: 0.6
        high: 1.0

    xgboost:
      n_estimators:
        type: int
        low: 100
        high: 600
      learning_rate:
        type: log_float
        low: 0.005
        high: 0.1
      max_depth:
        type: int
        low: 1
        high: 3
      min_child_weight:
        type: int
        low: 2
        high: 8
      subsample:
        type: float
        low: 0.6
        high: 1.0
      colsample_bytree:
        type: float
        low: 0.6
        high: 1.0
      reg_alpha:
        type: log_float
        low: 0.0001
        high: 1.0
      reg_lambda:
        type: log_float
        low: 0.1
        high: 20.0

    lightgbm:
      n_estimators:
        type: int
        low: 100
        high: 600
      learning_rate:
        type: log_float
        low: 0.005
        high: 0.1
      max_depth:
        type: int
        low: 2
        high: 4
      num_leaves:
        type: int
        low: 4
        high: 15
      min_child_samples:
        type: int
        low: 3
        high: 12
      subsample:
        type: float
        low: 0.6
        high: 1.0
      colsample_bytree:
        type: float
        low: 0.6
        high: 1.0
      reg_alpha:
        type: log_float
        low: 0.0001
        high: 1.0
      reg_lambda:
        type: log_float
        low: 0.1
        high: 20.0

    shallow_mlp_regressor:
      hidden_layer_sizes:
        type: categorical
        values:
          - [8]
          - [16]
          - [32]
          - [16, 8]
      alpha:
        type: log_float
        low: 0.0001
        high: 0.1
      learning_rate_init:
        type: log_float
        low: 0.0001
        high: 0.01
